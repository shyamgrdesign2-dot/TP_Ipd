name: Trigger auto deployment for strauss-doctor-portal

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ qa ]
    paths:
    - '**'
    - '.github/workflows/strauss-doctor-portal-AutoDeployTrigger-7c3630ea-8793-45d5-8280-ee6f7a37795e.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.STRAUSSDOCTORPORTAL_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.STRAUSSDOCTORPORTAL_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.STRAUSSDOCTORPORTAL_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }} 
          registryUrl: strausshealth.azurecr.io
          registryUsername: ${{ secrets.STRAUSSDOCTORPORTAL_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.STRAUSSDOCTORPORTAL_REGISTRY_PASSWORD }}
          containerAppName: strauss-doctor-portal
          resourceGroup: dhspl-upgrade-node_group
          imageToBuild: strausshealth.azurecr.io/strauss-doctor-portal:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


