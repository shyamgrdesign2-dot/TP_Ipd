# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - qa-doctor-portal

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'
    env:
      REACT_APP_ENV: qa

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://thyrocareapp.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_131af9c4a404477495185a463b2d2039 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_ac0f863a34594333a15d0ef8df0c957a }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: thyrocareapp.azurecr.io/doctor-portal:${{ github.sha }}
        file: ./Dockerfile
        build-args: REACT_APP_ENV=${{ env.REACT_APP_ENV }}  # Pass REACT_APP_ENV as a build argument

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'qa-doctor-portal'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_0b0b31b44c574795a7a7ce1d9f0680d0 }}
        images: 'thyrocareapp.azurecr.io/doctor-portal:${{ github.sha }}'