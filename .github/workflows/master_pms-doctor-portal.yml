# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - pms-doctor-portal

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'
    env:
      REACT_APP_ENV: prod

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://acinacr.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_682345f8e44844ac8a9aeeea0b118ba3 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_cb1b39798bfe4a8caa4560617ccd26be }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: acinacr.azurecr.io/doctor-portal/prod:${{ github.sha }}
        file: ./Dockerfile
        build-args: REACT_APP_ENV=${{ env.REACT_APP_ENV }}  # Pass REACT_APP_ENV as a build argument

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'pms-doctor-portal'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_b231f73668c64cd892604dffb45f1cb8 }}
        images: 'acinacr.azurecr.io/doctor-portal/prod:${{ github.sha }}'