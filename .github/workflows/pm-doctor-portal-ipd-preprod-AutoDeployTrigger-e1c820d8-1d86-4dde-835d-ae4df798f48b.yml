name: Trigger auto deployment for pm-doctor-portal-ipd-preprod

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ ipd-prod ]
    paths:
    - '**'
    - '.github/workflows/pm-doctor-portal-ipd-preprod-AutoDeployTrigger-e1c820d8-1d86-4dde-835d-ae4df798f48b.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PMDOCTORPORTALIPDPREPROD_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PMDOCTORPORTALIPDPREPROD_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PMDOCTORPORTALIPDPREPROD_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: zypractice03.azurecr.io
          registryUsername: ${{ secrets.PMDOCTORPORTALIPDPREPROD_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.PMDOCTORPORTALIPDPREPROD_REGISTRY_PASSWORD }}
          containerAppName: pm-doctor-portal-ipd-preprod
          resourceGroup: practice-preprod
          imageToBuild: zypractice03.azurecr.io/pm-doctor-portal-ipd-preprod:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


