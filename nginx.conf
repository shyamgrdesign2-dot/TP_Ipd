user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  sendfile on;
  keepalive_timeout 65;
  
  server {
    listen 80;

    location /case_manager/pdf_casemanager_send.php {
      add_header 'Access-Control-Allow-Origin' '*';
      add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
      add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With';
      add_header 'Access-Control-Allow-Credentials' 'true';
      proxy_pass https://pm-uat-dhspl-2.tatvacare.in;
    }

    # Proxy shared-ui remoteEntry and assets to avoid CORS by keeping same origin
    location /shared-ui/ {
      # Ensure correct Host and SNI for HTTPS upstream
      proxy_set_header Host pm-storybook-ui-prod.tatvacare.in;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_buffering off;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_ssl_server_name on;
      proxy_ssl_name pm-storybook-ui-prod.tatvacare.in;
      proxy_redirect off;
      proxy_read_timeout 60s;
      proxy_connect_timeout 10s;
      proxy_pass https://pm-storybook-ui-prod.tatvacare.in/;
    }

    location / {
      root /usr/share/nginx/html;
      index index.html index.htm;
      try_files $uri $uri/ /index.html =404;
    }
  }
}
